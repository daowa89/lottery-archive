name: Update AT Lotto 6 aus 45

on:
  schedule:
    # Austria draws on Wednesday and Sunday at ~19:00 CET (18:00 UTC summer / 17:00 UTC winter).
    # Running at 20:00 UTC ensures results are published before we fetch.
    - cron: "0 20 * * 0,3"   # Sunday (0) and Wednesday (3)

  workflow_dispatch:
    inputs:
      init:
        description: "Full historical import (1986 to present)"
        required: false
        default: false
        type: boolean

jobs:
  update-at:
    runs-on: ubuntu-latest

    permissions: {}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: 3418719
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install .

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and commit AT results
        run: |
          if [ "${{ github.event.inputs.init }}" = "true" ]; then
            python scripts/fetch_lotto_at_6aus45.py --init --commit
          else
            python scripts/fetch_lotto_at_6aus45.py --commit
          fi

      - name: Run integrity check
        run: |
          if git log origin/main..HEAD --oneline 2>/dev/null | grep -q .; then
            python scripts/check_integrity.py --country at
          else
            python scripts/check_integrity.py --country at --skip-stale
          fi

      - name: Push new commit (if any)
        run: |
          if git log origin/main..HEAD --oneline 2>/dev/null | grep -q .; then
            git push origin HEAD:main
          else
            echo "No new commits to push."
          fi
